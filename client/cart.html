<body>

<header>

<p>Your Shopping Cart</p>
</header>

<div class="cart-page">

    <h1 class="cart-page-title">Your Picks (<span id="cart-item-count">0</span>)</h1>

    <label class="select-all-row">
        <input type="checkbox" id="select-all-checkbox" class="circular-checkbox" onchange="toggleSelectAll(this.checked)">
        Select all
    </label>

    <div class="cart-divider"></div>

    <div id="cartItems" class="cart-list"></div>

    <div class="cart-footer">
        <div class="cart-footer-left">
            <div class="cart-footer-gift-wrapper">
                <span class="cart-footer-gift-icon">🎁</span>
                <span id="selected-count-badge" class="cart-footer-badge">0</span>
            </div>
            <div>
                <p class="cart-footer-total-label">Total</p>
                <p id="total" class="cart-footer-total-value">UGX 0</p>
            </div>
        </div>

        <a href="checkout.html">
            <button class="cart-checkout-btn">
                <span class="cart-checkout-btn-title">Checkout</span>
                <span class="cart-checkout-btn-sub">✓ Secure Checkout</span>
            </button>
        </a>
    </div>

</div>

<script src="js/api.js"></script>
<script src="js/cart.js"></script>
