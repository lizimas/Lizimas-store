<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Lizimas Store</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="checkout-page">

    <header class="checkout-header">
        <div class="checkout-logo-row">
            <div class="checkout-logo-badge">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            </div>
            <h1 class="checkout-brand-name">Lizimas &amp; Talent<br>Enterprise</h1>
        </div>
        <div class="checkout-secure-badge">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#FF6600" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/></svg>
            Secure Login
        </div>
    </header>

    <nav class="checkout-nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="register.html">Register</a>
    </nav>

    <div class="checkout-card" id="login-form-card">
        <h2 class="checkout-card-title">Log In</h2>
        <p class="checkout-card-subtitle">Access your account to track orders and check out faster.</p>

        <div class="checkout-input-group">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#FF6600" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="m22 6-10 7L2 6"/></svg>
            <input id="login-email" type="email" placeholder="Email Address">
        </div>

        <div class="checkout-input-group">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#FF6600" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input id="login-password" type="password" placeholder="Password">
        </div>

        <p id="login-status" class="delivery-fee-status"></p>

        <p style="text-align:right; margin: -8px 0 14px;">
            <a href="forgot-password.html" style="color:#FF6600; font-size:13px; font-weight:600; text-decoration:none;">Forgot password?</a>
        </p>

        <button class="checkout-place-order-btn" onclick="loginAccount()">Log In</button>

        <p class="checkout-safe-note">
            Don't have an account? <a href="register.html" style="color:#FF6600; font-weight:600; text-decoration:none;">Sign up</a>
        </p>
    </div>

    <div class="checkout-card" id="twofa-form-card" style="display:none;">
        <h2 class="checkout-card-title">Two-Factor Code</h2>
        <p class="checkout-card-subtitle">Enter the 6-digit code from your authenticator app.</p>

        <div class="checkout-input-group">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#FF6600" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/><circle cx="12" cy="16" r="1.5"/></svg>
            <input id="twofa-code" type="text" placeholder="6-digit code" maxlength="6" inputmode="numeric">
        </div>

        <p id="twofa-status" class="delivery-fee-status"></p>

        <button class="checkout-place-order-btn" onclick="verifyTwoFactor()">Verify & Log In</button>
    </div>

</div>

<script src="js/api.js"></script>
<script src="js/login.js"></script>

</body>
</html>
