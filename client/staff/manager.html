<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Lizimas Store — Store Manager</title>
<link rel="stylesheet" href="../css/admin.css">
</head>
<body>

    <div class="dashboard-screen">
        <div class="admin-shell">

            <aside class="admin-sidebar">
                <div class="sidebar-brand">
                    <span class="sidebar-brand-icon">L</span>
                    <span>Lizimas Staff</span>
                </div>
                <div style="padding:16px; color:#ccc; font-size:13px;">
                    Signed in as <strong id="staff-name-display">...</strong><br>
                    Store Manager
                </div>
                <button onclick="staffLogout()" style="margin:16px; background:#DC2626; color:#fff; border:none; border-radius:8px; padding:10px; cursor:pointer; width:calc(100% - 32px);">Log Out</button>
            </aside>

            <main class="admin-main">
                <header class="admin-topbar">
                    <h1>Store Manager Dashboard</h1>
                </header>

                <div class="admin-content">

                    <div class="product-summary-grid" id="product-summary-grid"></div>

                    <div class="panel">
                        <h2 id="product-form-title">Add Product</h2>
                        <p style="font-size:13px; color:#666; margin-top:-8px;">Products you add or edit here go live immediately.</p>

                        <div class="product-form-sections">
                            <div class="product-form-section">
                                <h4>Basic Information</h4>
                                <div class="field-row">
                                    <input type="hidden" id="product-id">
                                    <input type="text" id="product-name" placeholder="Product name">
                                    <select id="product-category"></select>
                                    <textarea id="product-description" placeholder="Description"></textarea>
                                </div>
                            </div>

                            <div class="product-form-section">
                                <h4>Pricing &amp; Inventory</h4>
                                <div class="field-row">
                                    <input type="number" id="product-price" placeholder="Price (UGX)">
                                    <input type="number" id="product-stock" placeholder="Stock quantity">
                                </div>
                            </div>

                            <div class="product-form-section">
                                <h4>Images</h4>
                                <div class="drag-drop-zone" id="product-image-dropzone">
                                    Drag &amp; drop images here, or tap to browse
                                </div>
                                <input type="file" id="product-image" accept="image/*" multiple class="hidden">
                                <div class="drag-drop-preview-grid" id="product-image-preview"></div>
                            </div>
                        </div>

                        <div style="display:flex; gap:10px; margin-top:16px;">
                            <button onclick="submitProductForm()" id="product-submit-btn" style="background:#1a1a2e; color:#fff; border:none; border-radius:8px; padding:10px 16px; cursor:pointer; flex:1;">Publish Product</button>
                            <button onclick="resetProductForm()" style="background:#eee; color:#333; border:none; border-radius:8px; padding:10px 16px; cursor:pointer;">Clear</button>
                        </div>
                        <p id="product-form-status" style="font-size:13px; color:#666; margin-top:8px;"></p>
                    </div>

                    <div class="panel">
                        <h2>My Products</h2>
                        <div class="product-toolbar">
                            <input type="text" id="product-search-input" class="product-search-input" placeholder="Search my products..." oninput="renderMyProductsTable()">
                            <div class="filter-tabs" id="product-filter-tabs">
                                <button class="filter-tab active" data-filter="all" onclick="setManagerFilter('all')">All</button>
                                <button class="filter-tab" data-filter="live" onclick="setManagerFilter('live')">Live</button>
                                <button class="filter-tab" data-filter="pending" onclick="setManagerFilter('pending')">Pending</button>
                            </div>
                        </div>
                        <div id="my-products-list">Loading...</div>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <script src="../js/staff-manager.js"></script>
</body>
</html>
