<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Lizimas Store — Product Staff</title>
<link rel="stylesheet" href="../css/admin.css">
</head>
<body>

    <div class="dashboard-screen">
        <div class="admin-shell">

            <aside class="admin-sidebar">
                <div class="sidebar-brand">
                    <span class="sidebar-brand-icon">L</span>
                    <span>Lizimas Staff</span>
                </div>
                <div style="padding:16px; color:#ccc; font-size:13px; cursor:pointer;" onclick="openProfilePanel()">
                    Signed in as <strong id="staff-name-display">...</strong><br>
                    Product Staff
                    <div style="color:#f4b400; font-size:12px; margin-top:4px;">Tap to edit profile &rarr;</div>
                </div>
                <button onclick="staffLogout()" style="margin:16px; background:#DC2626; color:#fff; border:none; border-radius:8px; padding:10px; cursor:pointer; width:calc(100% - 32px);">Log Out</button>
            </aside>

            <main class="admin-main">
                <header class="admin-topbar">
                    <h1>Product Staff Dashboard</h1>
                </header>

                <div class="admin-content">

                    <div class="panel">
                        <h2 id="product-form-title">Add Product</h2>
                        <p style="font-size:13px; color:#666; margin-top:-8px;">Submissions go to the admin for approval before appearing in the store.</p>
                        <div style="display:flex; flex-direction:column; gap:10px; max-width:480px;">
                            <input type="hidden" id="product-id">
                            <input type="text" id="product-name" placeholder="Product name" style="padding:10px; border:1px solid #ccc; border-radius:8px;">
                            <select id="product-category" style="padding:10px; border:1px solid #ccc; border-radius:8px;"></select>
                            <textarea id="product-description" placeholder="Description" style="padding:10px; border:1px solid #ccc; border-radius:8px; min-height:80px;"></textarea>
                            <input type="number" id="product-price" placeholder="Price (UGX)" style="padding:10px; border:1px solid #ccc; border-radius:8px;">
                            <input type="number" id="product-stock" placeholder="Stock quantity" style="padding:10px; border:1px solid #ccc; border-radius:8px;">
                            <input type="file" id="product-image" accept="image/*" multiple>
                            <div style="display:flex; gap:10px;">
                                <button onclick="submitProductForm()" id="product-submit-btn" style="background:#1a1a2e; color:#fff; border:none; border-radius:8px; padding:10px; cursor:pointer; flex:1;">Submit for Approval</button>
                                <button onclick="resetProductForm()" style="background:#eee; color:#333; border:none; border-radius:8px; padding:10px; cursor:pointer;">Clear</button>
                            </div>
                            <p id="product-form-status" style="font-size:13px; color:#666;"></p>
                        </div>
                    </div>

                    <div class="panel">
                        <h2>My Submissions</h2>
                        <div id="my-products-list">Loading...</div>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <script src="../js/staff-product.js"></script>\n    <script src="../js/photo-crop.js"></script>

    <div class="profile-panel-overlay" id="profile-panel-overlay" onclick="closeProfilePanel()"></div>
    <div class="profile-panel" id="profile-panel">
        <div class="profile-panel-handle"></div>
        <button class="profile-panel-close" onclick="closeProfilePanel()">&times;</button>

        <div class="profile-panel-photo-section">
            <div class="profile-photo-circle" id="profile-photo-circle" onclick="triggerPhotoUpload()">
                <span id="profile-photo-placeholder" style="font-size:32px; color:#bbb;">+</span>
                <img id="profile-photo-img" src="" alt="Profile photo" class="hidden">
            </div>
            <input type="file" id="profile-photo-file-input" accept="image/jpeg,image/png,image/webp" class="hidden" onchange="handlePhotoFileSelected(event)">
            <div class="profile-photo-actions">
                <button onclick="triggerPhotoUpload()">Change Photo</button>
                <button class="remove-link" onclick="removeProfilePhotoAction()">Remove</button>
            </div>
            <div class="profile-photo-name" id="profile-photo-name">...</div>
            <div class="profile-photo-role" id="profile-photo-role">...</div>
        </div>

        <div class="profile-form-section">
            <h4>Personal Information</h4>
            <div class="field-row">
                <input type="text" id="profile-first-name" placeholder="First Name">
                <input type="text" id="profile-last-name" placeholder="Last Name">
                <input type="text" id="profile-display-name" placeholder="Display Name">
                <input type="tel" id="profile-phone" placeholder="Phone Number">
                <select id="profile-gender">
                    <option value="">Gender (optional)</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
                <input type="date" id="profile-dob">
                <div style="position:relative;">
                    <input type="text" id="profile-country" placeholder="Search country..." autocomplete="off" oninput="filterCountryResults()" onfocus="filterCountryResults()">
                    <div id="country-results-dropdown" class="district-results-dropdown"></div>
                </div>
                <input type="text" id="profile-city" placeholder="City">
            </div>
        </div>

        <div class="profile-panel-footer">
            <button onclick="closeProfilePanel()">Cancel</button>
            <button onclick="saveProfileInfo()">Save Changes</button>
        </div>
        <p id="profile-save-status" style="font-size:13px; color:#666; margin-top:8px;"></p>
    </div>


    <div class="crop-modal-overlay" id="crop-modal-overlay">
        <div class="crop-viewport" id="crop-viewport">
            <img id="crop-image" src="" alt="Crop preview">
        </div>
        <p class="crop-modal-hint">Drag to reposition &bull; Pinch or scroll to zoom</p>
        <div class="crop-modal-actions">
            <button class="crop-cancel" onclick="closeCropModal()">Cancel</button>
            <button class="crop-confirm" onclick="confirmCrop()">Use This Photo</button>
        </div>
    </div>

</body>
</html>
